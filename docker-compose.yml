services:
  wdb-backend:
    build:
      context: ./wdb-backend
    ports:
      - "5258:5258"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:5258
      - ConnectionStrings__DefaultConnection=${CONNECTION_STRING}

      # Supabase storage (worker file uploads + employer signed-URL downloads)
      - Supabase__Url=${Supabase__Url}
      - Supabase__ServiceRoleKey=${Supabase__ServiceRoleKey}
      - Supabase__DocumentsBucket=${Supabase__DocumentsBucket:-worker-documents}

      # Local host mode:
      # If blockchain runs separately on your machine, backend connects through host.docker.internal.
      # If blockchain is not running, backend should gracefully return empty audit records.
      - Blockchain__RpcUrl=${BLOCKCHAIN_RPC_URL:-http://host.docker.internal:8545}
      - Blockchain__ContractAddress=${BLOCKCHAIN_CONTRACT_ADDRESS}
      - Blockchain__AbiPath=/app/blockchain-artifacts/contracts/TransactionLog.sol/TransactionLog.json

      # Funded local demo wallet used to pay gas for blockchain audit transactions.
      # The event still records the actual employer and worker blockchain addresses.
      - Blockchain__SystemPrivateKey=${BLOCKCHAIN_SYSTEM_PRIVATE_KEY}

    volumes:
      - ./wdb-blockchain/artifacts:/app/blockchain-artifacts:ro
    networks:
      - wdb-network

  wdb-frontend:
    build:
      context: ./wdb-frontend
    ports:
      - "3000:3000"
    depends_on:
      - wdb-backend
    networks:
      - wdb-network

networks:
  wdb-network:
    driver: bridge
